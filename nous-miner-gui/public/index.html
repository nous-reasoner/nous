<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NOUS Miner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
    }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { color: #00ff88; margin-bottom: 30px; }
    .section {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .section h2 {
      color: #00ff88;
      font-size: 18px;
      margin-bottom: 15px;
    }
    .form-group { margin-bottom: 15px; }
    label {
      display: block;
      color: #999;
      font-size: 12px;
      margin-bottom: 5px;
    }
    input, select {
      width: 100%;
      padding: 10px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 14px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #00ff88;
    }
    button {
      padding: 12px 24px;
      background: #00ff88;
      color: #0a0a0a;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #00dd77; }
    button:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 15px;
      background: #0a0a0a;
      border-radius: 4px;
      margin-bottom: 15px;
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #666;
    }
    .status-dot.active { background: #00ff88; }
    .log {
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 15px;
      height: 200px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #999;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    .stat-card {
      background: #0a0a0a;
      padding: 15px;
      border-radius: 4px;
    }
    .stat-label {
      color: #666;
      font-size: 12px;
      margin-bottom: 5px;
    }
    .stat-value {
      color: #00ff88;
      font-size: 24px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>NOUS Miner</h1>

    <div class="section">
      <h2>Configuration</h2>
      <div class="form-group">
        <label>Node URL</label>
        <select id="nodeUrl">
          <option value="http://80.78.26.7/api/testnet">Testnet (80.78.26.7)</option>
          <option value="http://80.78.26.7/api">Mainnet (80.78.26.7)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Mining Address</label>
        <input type="text" id="address" placeholder="nous1q..." />
      </div>
      <div class="form-group">
        <label>AI Provider</label>
        <select id="aiProvider" onchange="onProviderChange()">
          <option value="openai">OpenAI</option>
          <option value="anthropic">Anthropic</option>
          <option value="ollama">Ollama (Local)</option>
        </select>
      </div>
      <div class="form-group">
        <label>API Base URL (leave default for official, or enter proxy URL)</label>
        <input type="text" id="apiBaseUrl" placeholder="https://api.anthropic.com" />
      </div>
      <div class="form-group">
        <label>API Key (leave empty for Ollama)</label>
        <input type="password" id="apiKey" placeholder="sk-..." />
      </div>
      <div class="form-group">
        <label>Model</label>
        <select id="model">
          <optgroup label="Anthropic">
            <option value="claude-sonnet-4-6" selected>Claude Sonnet 4.6</option>
            <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
          </optgroup>
          <optgroup label="OpenAI">
            <option value="gpt-4o">gpt-4o</option>
            <option value="gpt-4o-mini">gpt-4o-mini</option>
          </optgroup>
          <optgroup label="Ollama">
            <option value="llama3">Llama 3</option>
            <option value="mistral">Mistral</option>
          </optgroup>
        </select>
      </div>
    </div>

    <div class="section">
      <h2>Status</h2>
      <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Idle</span>
      </div>
      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Balance</div>
          <div class="stat-value" id="balance">0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Blocks Found</div>
          <div class="stat-value" id="blocksFound">0</div>
        </div>
      </div>
      <div style="margin-top: 15px;">
        <button id="startBtn" onclick="startMining()">Start Mining</button>
        <button id="stopBtn" onclick="stopMining()" disabled style="margin-left: 10px;">Stop</button>
      </div>
    </div>

    <div class="section">
      <h2>Logs</h2>
      <div class="log" id="log"></div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    let isMining = false;
    let blocksFound = 0;

    function onProviderChange() {
      const provider = document.getElementById('aiProvider').value;
      const baseUrlInput = document.getElementById('apiBaseUrl');
      const defaults = {
        openai: 'https://api.openai.com',
        anthropic: 'https://api.anthropic.com',
        ollama: 'http://localhost:11434'
      };
      baseUrlInput.placeholder = defaults[provider] || '';
    }

    async function startMining() {
      const config = {
        nodeUrl: document.getElementById('nodeUrl').value,
        address: document.getElementById('address').value,
        aiProvider: document.getElementById('aiProvider').value,
        apiBaseUrl: document.getElementById('apiBaseUrl').value,
        apiKey: document.getElementById('apiKey').value,
        model: document.getElementById('model').value
      };

      if (!config.address) {
        addLog('Error: Mining address required');
        return;
      }

      const result = await ipcRenderer.invoke('start-mining', config);
      if (result.error) {
        addLog(`Error: ${result.error}`);
        return;
      }

      isMining = true;
      updateUI();
      addLog('Mining started...');
    }

    async function stopMining() {
      await ipcRenderer.invoke('stop-mining');
      isMining = false;
      updateUI();
      addLog('Mining stopped');
    }

    function updateUI() {
      document.getElementById('startBtn').disabled = isMining;
      document.getElementById('stopBtn').disabled = !isMining;
      document.getElementById('statusDot').className = 'status-dot' + (isMining ? ' active' : '');
      document.getElementById('statusText').textContent = isMining ? 'Mining...' : 'Idle';
    }

    function addLog(text) {
      const log = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      log.innerHTML += `[${time}] ${text}\n`;
      log.scrollTop = log.scrollHeight;
    }

    ipcRenderer.on('miner-log', (event, data) => {
      addLog(data.trim());
      if (data.includes('Block found')) {
        blocksFound++;
        document.getElementById('blocksFound').textContent = blocksFound;
      }
    });

    ipcRenderer.on('miner-stopped', () => {
      isMining = false;
      updateUI();
    });

    // Update balance every 30s
    setInterval(async () => {
      const address = document.getElementById('address').value;
      const nodeUrl = document.getElementById('nodeUrl').value;
      if (address && nodeUrl) {
        try {
          const balance = await ipcRenderer.invoke('get-balance', { nodeUrl, address });
          document.getElementById('balance').textContent = (balance.balance / 100000000).toFixed(8);
        } catch (e) {
          console.error('Failed to fetch balance:', e);
        }
      }
    }, 30000);
  </script>
</body>
</html>
