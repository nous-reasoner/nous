<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NOUS Miner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
    }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { color: #00ff88; margin-bottom: 30px; }
    .section {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .section h2 {
      color: #00ff88;
      font-size: 18px;
      margin-bottom: 15px;
    }
    .form-group { margin-bottom: 15px; }
    label {
      display: block;
      color: #999;
      font-size: 12px;
      margin-bottom: 5px;
    }
    input, select {
      width: 100%;
      padding: 10px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 14px;
    }
    input:focus, select:focus { outline: none; border-color: #00ff88; }
    button {
      padding: 12px 24px;
      background: #00ff88;
      color: #0a0a0a;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #00dd77; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 15px;
      background: #0a0a0a;
      border-radius: 4px;
      margin-bottom: 15px;
    }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #666; }
    .status-dot.active { background: #00ff88; }
    .log {
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 15px;
      height: 250px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #999;
    }
    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 15px; }
    .stat-card { background: #0a0a0a; padding: 15px; border-radius: 4px; }
    .stat-label { color: #666; font-size: 12px; margin-bottom: 5px; }
    .stat-value { color: #00ff88; font-size: 24px; font-weight: 600; }
    .solver-desc {
      color: #666;
      font-size: 11px;
      margin-top: 5px;
      font-style: italic;
    }
    .solver-config {
      margin-top: 10px;
      padding: 12px;
      background: #0a0a0a;
      border-radius: 4px;
      border: 1px solid #222;
    }
    .solver-config .form-group { margin-bottom: 10px; }
    .solver-config .form-group:last-child { margin-bottom: 0; }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #999;
      font-size: 13px;
      cursor: pointer;
    }
    .checkbox-label input[type="checkbox"] { width: auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>NOUS Miner</h1>

    <div class="section">
      <h2>Configuration</h2>
      <div class="form-group">
        <label>Node URL</label>
        <input type="text" id="nodeUrl" value="http://rpc.nouschain.org/api" placeholder="http://your-node:8332/rpc" />
      </div>
      <div class="form-group">
        <label>Mining Address</label>
        <div style="display: flex; gap: 8px;">
          <input type="text" id="address" placeholder="nous1q..." readonly style="flex: 1;" />
          <button onclick="createWallet()" style="width: auto; padding: 10px 16px;">New Wallet</button>
          <button onclick="exportPrivateKey()" style="width: auto; padding: 10px 16px; background: #ff9500;">Export Key</button>
        </div>
        <div style="color: #666; font-size: 11px; margin-top: 5px;">Wallet saved to ~/.nous-miner/wallet.json</div>
      </div>
      <div class="form-group">
        <label>Solver</label>
        <select id="solver" onchange="updateSolverUI()">
          <option value="probsat">ProbSAT (Fast, recommended)</option>
          <option value="ai-guided">AI-Guided ProbSAT (Experimental)</option>
          <option value="pure-ai">Pure AI (Educational only)</option>
          <option value="custom">Custom Solver (Advanced)</option>
        </select>
        <div class="solver-desc" id="solverDesc">Fast stochastic local search — CPU-only, ~10 solves/sec</div>
      </div>

      <!-- AI Config (for ai-guided and pure-ai) -->
      <div id="aiConfig" style="display:none;">
        <div class="solver-config">
          <div class="form-group">
            <label>AI Provider</label>
            <select id="aiProvider">
              <option value="anthropic">Anthropic</option>
              <option value="openai">OpenAI</option>
            </select>
          </div>
          <div class="form-group">
            <label>API Base URL (optional, for proxies)</label>
            <input type="text" id="baseUrl" placeholder="https://api.anthropic.com" />
          </div>
          <div class="form-group">
            <label>API Key</label>
            <input type="password" id="apiKey" placeholder="sk-..." />
          </div>
          <div class="form-group">
            <label>Model</label>
            <input type="text" id="aiModel" value="claude-sonnet-4-6" />
          </div>
          <div id="fallbackOption" class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="useFallback" checked />
              Fallback to ProbSAT if AI fails
            </label>
          </div>
        </div>
      </div>

      <!-- Custom Solver Config -->
      <div id="customConfig" style="display:none;">
        <div class="solver-config">
          <div class="form-group">
            <label>Solver Script Path</label>
            <input type="text" id="scriptPath" placeholder="/path/to/solver.py" />
          </div>
          <div style="color:#666; font-size:11px;">
            Script reads DIMACS CNF from stdin, outputs 256 binary digits to stdout
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Status</h2>
      <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Idle</span>
      </div>
      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Available Balance</div>
          <div class="stat-value" id="balance">0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Immature (Mining)</div>
          <div class="stat-value" id="immature" style="color:#ffaa00;">0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Blocks Found</div>
          <div class="stat-value" id="blocksFound">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Solve Rate</div>
          <div class="stat-value" id="solveRate" style="color:#88aaff;">—</div>
        </div>
      </div>
      <div style="margin-top: 15px;">
        <button id="startBtn" onclick="startMining()">Start Mining</button>
        <button id="stopBtn" onclick="stopMining()" disabled style="margin-left: 10px;">Stop</button>
      </div>
    </div>

    <div class="section">
      <h2>Logs</h2>
      <div class="log" id="log"></div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    let isMining = false;
    let blocksFound = 0;

    const solverDescs = {
      'probsat': 'Fast stochastic local search — CPU-only, ~10 solves/sec',
      'ai-guided': 'AI suggests initial assignment, ProbSAT refines — requires API key',
      'pure-ai': 'AI attempts direct solve — very slow, nearly 0% success rate',
      'custom': 'Run your own solver script — reads DIMACS from stdin'
    };

    function updateSolverUI() {
      const solver = document.getElementById('solver').value;
      document.getElementById('solverDesc').textContent = solverDescs[solver] || '';
      document.getElementById('aiConfig').style.display =
        (solver === 'ai-guided' || solver === 'pure-ai') ? 'block' : 'none';
      document.getElementById('customConfig').style.display =
        solver === 'custom' ? 'block' : 'none';
      document.getElementById('fallbackOption').style.display =
        solver === 'ai-guided' ? 'block' : 'none';
    }

    async function startMining() {
      const solver = document.getElementById('solver').value;
      const config = {
        nodeUrl: document.getElementById('nodeUrl').value,
        address: document.getElementById('address').value,
        solver: solver,
        aiProvider: document.getElementById('aiProvider').value,
        baseUrl: document.getElementById('baseUrl').value,
        apiKey: document.getElementById('apiKey').value,
        model: document.getElementById('aiModel').value,
        scriptPath: document.getElementById('scriptPath').value
      };

      if (!config.address) {
        addLog('Error: Mining address required');
        return;
      }

      const result = await ipcRenderer.invoke('start-mining', config);
      if (result.error) {
        addLog('Error: ' + result.error);
        return;
      }

      isMining = true;
      updateUI();
      addLog('Mining started with ' + solver + ' solver...');
    }

    async function stopMining() {
      await ipcRenderer.invoke('stop-mining');
      isMining = false;
      updateUI();
      addLog('Mining stopped');
    }

    function updateUI() {
      document.getElementById('startBtn').disabled = isMining;
      document.getElementById('stopBtn').disabled = !isMining;
      document.getElementById('statusDot').className = 'status-dot' + (isMining ? ' active' : '');
      document.getElementById('statusText').textContent = isMining ? 'Mining...' : 'Idle';
    }

    function addLog(text, isError) {
      const log = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      const color = isError ? 'color:#ff4444;' : '';
      log.innerHTML += '<span style="' + color + '">[' + time + '] ' + text + '</span>\n';
      log.scrollTop = log.scrollHeight;
    }

    // Batch miner logs: accumulate stats, flush every 5s
    let minerStats = { sat: 0, seeds: 0, lastSeed: 0, rate: '' };
    let logTimer = null;

    function flushMinerLog() {
      if (minerStats.seeds > 0) {
        const rateStr = minerStats.rate ? ' (' + minerStats.rate + ')' : '';
        addLog('Checked ' + minerStats.seeds + ' seeds, SAT solved: ' + minerStats.sat + rateStr);
        document.getElementById('solveRate').textContent = minerStats.rate || '—';
        minerStats = { sat: 0, seeds: 0, lastSeed: 0, rate: '' };
      }
    }

    ipcRenderer.on('miner-log', (event, data) => {
      for (const msg of data.split('\n')) {
        const line = msg.trim();
        if (!line) continue;

        // Strip timestamp prefix: "2026/03/07 17:38:24 " -> actual message
        const stripped = line.replace(/^\d{4}\/\d{2}\/\d{2}\s+\d{2}:\d{2}:\d{2}\s+/, '');

        // Immediate: block found, submitted, PoW met
        if (/PoW met|Submitting|Block found|accepted/i.test(stripped)) {
          flushMinerLog();
          addLog(stripped);
          if (/block found|accepted/i.test(stripped)) {
            blocksFound++;
            document.getElementById('blocksFound').textContent = blocksFound;
            fetchBalance();
          }
          continue;
        }

        // Immediate: starting, new block round
        if (/Starting miner|Mining block/i.test(stripped)) {
          addLog(stripped);
          continue;
        }

        // Immediate: AI-related messages
        if (/AI guess|AI failed|calling AI|fallback/i.test(stripped)) {
          addLog(stripped);
          continue;
        }

        // Immediate: real errors (not "no PoW match")
        if (/error|fail|fatal/i.test(stripped) && !/no PoW match/i.test(stripped)) {
          addLog(stripped, true);
          continue;
        }

        // Accumulate progress lines — show immediately if rate is slow
        const progressMatch = stripped.match(/(\d+) SAT solved \(([^)]+)\), seed=(\d+)/);
        if (progressMatch) {
          minerStats.sat = parseInt(progressMatch[1]);
          minerStats.rate = progressMatch[2];
          minerStats.seeds = parseInt(progressMatch[3]);
          document.getElementById('solveRate').textContent = minerStats.rate;

          // Parse rate: if < 10/s, show every progress line immediately
          const rateNum = parseFloat(minerStats.rate);
          if (rateNum < 10) {
            addLog('Checked ' + minerStats.seeds + ' seeds, SAT solved: ' + minerStats.sat + ' (' + minerStats.rate + ')');
            minerStats = { sat: 0, seeds: 0, lastSeed: 0, rate: '' };
          } else if (!logTimer) {
            logTimer = setInterval(flushMinerLog, 5000);
          }
        }
      }
    });

    async function fetchBalance() {
      const address = document.getElementById('address').value;
      const nodeUrl = document.getElementById('nodeUrl').value;
      if (address && nodeUrl) {
        try {
          const result = await ipcRenderer.invoke('get-balance', { nodeUrl, address });
          document.getElementById('balance').textContent = (result.balance / 100000000).toFixed(8);
          document.getElementById('immature').textContent = (result.immature / 100000000).toFixed(8);
        } catch (e) {}
      }
    }

    ipcRenderer.on('miner-stopped', () => {
      isMining = false;
      updateUI();
    });

    setInterval(fetchBalance, 30000);

    // --- Wallet management ---

    async function createWallet() {
      if (document.getElementById('address').value) {
        if (!confirm('A wallet already exists. Create a new one? The old wallet will be overwritten.')) return;
      }
      try {
        addLog('Creating wallet...');
        const wallet = await ipcRenderer.invoke('create-wallet');
        document.getElementById('address').value = wallet.address;
        addLog('Wallet created: ' + wallet.address);
        alert('Wallet created!\n\nAddress: ' + wallet.address + '\n\nSaved to: ~/.nous-miner/wallet.json\n\nClick "Export Key" to backup your private key.');
      } catch (e) {
        addLog('Error: ' + e.message);
      }
    }

    async function exportPrivateKey() {
      try {
        const result = await ipcRenderer.invoke('export-private-key');
        if (result.canceled) return;
        addLog('Wallet exported to: ' + result.path);
        alert('Wallet exported!\n\nFile: ' + result.path + '\nAddress: ' + result.address + '\n\nKeep this file safe!');
      } catch (e) {
        addLog('Error: ' + e.message);
        alert('No wallet found. Create one first.');
      }
    }

    // Load wallet on startup
    (async () => {
      try {
        const wallet = await ipcRenderer.invoke('load-wallet');
        if (wallet && wallet.address) {
          document.getElementById('address').value = wallet.address;
          addLog('Wallet loaded: ' + wallet.address);
        }
      } catch (e) {}
    })();
  </script>
</body>
</html>
